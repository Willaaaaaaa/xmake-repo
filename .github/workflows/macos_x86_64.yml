name: macOS (x86_64)

on:
  pull_request:
    branches:
      - dev

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13]
        arch: [x86_64]
        kind: [static, shared]

    runs-on: ${{ matrix.os }}

    concurrency:
        group: ${{ github.ref }}-${{ github.base_ref }}-${{ github.head_ref }}-macOS-${{ matrix.arch }}-${{ matrix.kind }}
        cancel-in-progress: true
    steps:
      - uses: actions/checkout@v1
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: branch@master
          actions-cache-folder: '.xmake-cache'

      - name: Tests
        run: |
          wget https://curl.haxx.se/ca/cacert.pem -O /tmp/cacert.pem
          export CURL_CA_BUNDLE=/tmp/cacert.pem
          sudo ln -s /usr/local/bin/gfortran-14 /usr/local/bin/gfortran
          sudo mkdir /usr/local/gfortran
          sudo ln -s /usr/local/Cellar/gcc@14/14.3.0/lib/gcc/14 /usr/local/gfortran/lib
          export PATH="$PATH:/usr/local/Cellar/gcc@14/14.3.0/libexec/gcc/x86_64-apple-darwin21/14/"
          export LIBRARY_PATH="$LIBRARY_PATH:/usr/local/Cellar/gcc@14/14.3.0/lib/gcc/14/"
          export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:/usr/local/Cellar/gcc@14/14.3.0/lib/gcc/14/"
          
          echo "------------------------------------------------------------------------------"
          echo "------------------------------------------------------------------------------"
          echo "------------------------------------------------------------------------------"
          echo "=== 验证gfortran路径 ==="
          ls -la /usr/local/bin/gfortran-14 || echo "!!! /usr/local/bin/gfortran-14 不存在"
          ls -la /usr/local/bin/gfortran || echo "!!! /usr/local/bin/gfortran 链接不存在"
          
          echo "=== 验证GCC路径 ==="
          ls -la /usr/local/Cellar/gcc@14/14.3.0/lib/gcc/14 || echo "!!! /usr/local/Cellar/gcc@14/14.3.0/lib/gcc/14 不存在"
          ls -la /usr/local/Cellar/gcc@14/14.3.0/libexec/gcc/x86_64-apple-darwin21/14/ || echo "!!! /usr/local/Cellar/gcc@14/14.3.0/libexec/gcc/x86_64-apple-darwin21/14/ 不存在"
          ls -la /usr/local/gfortran/lib || echo "!!! /usr/local/gfortran/lib 链接不存在"
          
          echo "=== 验证环境变量 ==="
          echo "PATH: $PATH"
          echo "LIBRARY_PATH: $LIBRARY_PATH" 
          echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          
          echo "=== 测试gfortran命令 ==="
          which gfortran || echo "!!! which gfortran 未找到"
          gfortran --version || echo "!!! gfortran --version 无法执行"
          echo "------------------------------------------------------------------------------"
          echo "------------------------------------------------------------------------------"
          echo "------------------------------------------------------------------------------"
          
          xmake l ./scripts/test.lua -D -a ${{ matrix.arch }} -k ${{ matrix.kind }}
